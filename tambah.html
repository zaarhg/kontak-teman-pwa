<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Kontak Teman">
  <title>Tambah Orang</title>

  <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="assets/icons/icon-512.png">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">

  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body data-page="tambah">
  <h1>Tambah Orang</h1>

  <div class="btn-row">
    <button id="btnBack" type="button" onclick="location.href='index.html'">Kembali</button>
  </div>

  <form id="formTambah">
    <label for="nama_lengkap">Nama Lengkap (wajib)</label>
    <input id="nama_lengkap" required>

    <label for="alamat">Alamat (wajib)</label>
    <textarea id="alamat" required></textarea>

    <label for="no_hp">No HP</label>
    <input id="no_hp">

    <label for="email">Email</label>
    <input id="email" type="email">

    <label for="foto">Foto</label>
    <input id="foto" type="file" accept="image/*">

    <label for="nama_alias">Nama alias</label>
    <input id="nama_alias">

    <label for="instansi_organisasi">Instansi / Organisasi</label>
    <input id="instansi_organisasi">

    <label for="jabatan">Jabatan</label>
    <input id="jabatan">

    <label for="tanggal_lahir">Tanggal lahir</label>
    <input id="tanggal_lahir" type="date">

    <label for="domisili">Domisili</label>
    <input id="domisili">

    <label for="nik">NIK</label>
    <input id="nik" inputmode="numeric" maxlength="32" placeholder="Opsional">

    <label for="catatan">Lain-lain</label>
    <textarea id="catatan"></textarea>

    <button id="btnSubmit" type="submit">Simpan</button>
  </form>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/app.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./service-worker.js");
    }
  </script>
</body>
</html>
