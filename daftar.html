<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Kontak Teman">
  <title>Daftar Orang</title>

  <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="assets/icons/icon-512.png">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">

  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body data-page="daftar">
  <h1>Daftar Orang</h1>

  <div class="btn-row">
    <button id="btnBack" type="button" onclick="location.href='index.html'">Kembali</button>
  </div>

  <input id="q" placeholder="Cari nama/alamat/no hp/email..." />
  <div id="list" class="empty">Loading...</div>

  <div id="shareModal" class="modal">
    <div class="modal-content">
      <h3>Bagikan (PDF)</h3>

      <label><input type="checkbox" id="withKop"> Pakai Kop Surat</label>
      <select id="kopSelect"></select>

      <hr>
      <div><b>Informasi yang dibagikan</b></div>

      <label><input type="checkbox" name="fields" value="nama_lengkap" checked> Nama</label><br>
      <label><input type="checkbox" name="fields" value="foto" checked> Foto</label><br>
      <label><input type="checkbox" name="fields" value="no_hp" checked> No HP</label><br>

      <label><input type="checkbox" name="fields" value="alamat"> Alamat</label><br>
      <label><input type="checkbox" name="fields" value="email"> Email</label><br>
      <label><input type="checkbox" name="fields" value="catatan"> Lain-lain</label><br>

      <label><input type="checkbox" name="fields" value="nama_alias"> Nama alias</label><br>
      <label><input type="checkbox" name="fields" value="instansi_organisasi"> Instansi / Organisasi</label><br>
      <label><input type="checkbox" name="fields" value="jabatan"> Jabatan</label><br>
      <label><input type="checkbox" name="fields" value="tanggal_lahir"> Tanggal lahir</label><br>
      <label><input type="checkbox" name="fields" value="domisili"> Domisili</label><br>
      <label><input type="checkbox" name="fields" value="nik"> NIK</label><br>

      <div style="margin-top:12px;">
        <label for="shareExtraNote"><b>Catatan tambahan untuk PDF (opsional)</b></label>
        <textarea
          id="shareExtraNote"
          rows="3"
          placeholder="Contoh: Kontak panitia acara / aktif WA / perlu follow up minggu depan"
        ></textarea>
      </div>

      <div style="margin-top:12px; display:flex; gap:8px;">
        <button id="shareRun" type="button">Buat & Dapatkan Link</button>
        <button id="shareClose" type="button">Tutup</button>
      </div>
    </div>
  </div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/app.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./service-worker.js");
    }
  </script>
</body>
</html>
