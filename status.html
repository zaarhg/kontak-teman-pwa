<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Kontak Teman">
  <title>Status</title>

  <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="assets/icons/icon-512.png">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">

  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body data-page="status">

  <h2>Status Sistem</h2>

  <div class="btn-row">
    <button id="btnBack" type="button" onclick="location.href='index.html'">Kembali</button>
    <button id="btnRefresh" type="button">Refresh</button>
  </div>

  <div id="statsBox" class="empty">Loading...</div>

  <hr>

  <h3>Maintenance</h3>
  <p class="small">Cleanup akan memindahkan PDF lama ke Trash (aman).</p>

  <div class="inline-gap">
    <input id="daysOld" type="number" value="30" min="1" style="width:140px;">
    <button id="btnCleanup" type="button" style="width:auto;">Cleanup PDF</button>
  </div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/app.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./service-worker.js");
    }
  </script>
</body>
</html>
