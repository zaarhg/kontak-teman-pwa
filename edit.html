<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Edit Orang</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0b5cff">
</head>
<body data-page="edit">
  <h1>Edit Orang</h1>

  <form id="formEdit">
    <input id="id" disabled>

    <!-- WAJIB / IDENTITAS INTI -->
    <label>Nama Lengkap (wajib)</label>
    <input id="nama_lengkap" required>

    <label>Alamat (wajib)</label>
    <textarea id="alamat" required></textarea>

    <!-- KONTAK -->
    <label>No HP</label>
    <input id="no_hp">

    <label>Email</label>
    <input id="email" type="email">

    <label>Foto (upload baru bila ingin ganti)</label>
    <input id="foto" type="file" accept="image/*">
    <div id="fotoPreview" style="font-size:12px;"></div>

    <!-- DETAIL TAMBAHAN (OPSIONAL) -->
    <label>Nama alias</label>
    <input id="nama_alias">

    <label>Instansi / Organisasi</label>
    <input id="instansi_organisasi">

    <label>Jabatan</label>
    <input id="jabatan">

    <label>Tanggal lahir</label>
    <input id="tanggal_lahir" type="date">

    <label>Domisili</label>
    <input id="domisili">

    <label>NIK</label>
    <input id="nik" inputmode="numeric" maxlength="32" placeholder="Opsional">

    <!-- KETERANGAN -->
    <label>Lain-lain</label>
    <textarea id="catatan"></textarea>

    <div style="display:flex; gap:8px; margin-top:10px;">
      <button id="btnSubmit" type="submit">Simpan Perubahan</button>
      <button id="btnBack" type="button">Kembali</button>
    </div>
  </form>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/app.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./service-worker.js");
    }
  </script>
</body>
</html>
